<body class="page-map sec-map">

  <header class="site-header site-header--transparent">
    <a href="/" class="site-logo">
      <img src="/assets/images/logo.png" alt="S3" class="site-logo__icon">
      <span class="site-logo__second">SECOND</span>
      <span class="site-logo__self">SELF</span>
      <span class="site-logo__studios">STUDIOS</span>
    </a>
    <nav class="site-nav">
      <a href="/pages/map/">Map</a>
      <a href="/pages/locations/">Locations</a>
      <a href="/pages/stories/">Stories</a>
      <a href="/pages/characters/">Characters</a>
      <a href="/pages/lore/">Lore</a>
      <a href="/pages/journal/">Journal</a>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Map intro card -->
  <div class="map-intro" id="map-intro">
    <p class="map-intro__label">The Known World</p>
    <h1 class="map-intro__title">Veridian</h1>
    <p class="map-intro__line">As charted by the Keepers of Azure Cove. Click a pin to open the record.</p>
  </div>

  <!-- Full-screen map -->
  <div id="map"
    data-width="2000"
    data-height="1125">
  </div>

  <!-- Sidebar -->
  <div id="map-sidebar">
    <div class="sidebar__close">
      <button class="sidebar__close-btn" id="map-sidebar-close">&times;</button>
    </div>
    <div id="map-sidebar-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/map.js"></script>

  <script data-goatcounter="https://secondselfstudios.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
