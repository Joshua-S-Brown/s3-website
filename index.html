<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Self Studios — The World of Veridia</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="description" content="Explore the world of Veridia. Three continents, fading magic, and centuries of buried history.">
  <meta property="og:image" content="/og-image.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="page-map">

  <header class="site-header site-header--transparent">
    <a href="/" class="site-logo">
      <img src="/assets/images/logo.png" alt="S3" class="site-logo__icon">
      <span class="site-logo__second">SECOND</span>
      <span class="site-logo__self">SELF</span>
      <span class="site-logo__studios">STUDIOS</span>
    </a>
    <nav class="site-nav">
      <a href="/pages/locations/">Locations</a>
      <a href="/pages/stories/">Stories</a>
      <a href="/pages/characters/">Characters</a>
      <a href="/pages/lore/">Lore</a>
      <a href="/pages/journal/">Journal</a>
    </nav>
  </header>

  <!-- Full-screen map -->
  <div id="map"
    data-width="2000"
    data-height="1125">
  </div>

  <!-- Landing overlay (covers map on first load) -->
  <div id="map-landing" class="map-landing">
    <div class="map-landing__content">
      <p class="map-landing__label">Second Self Studios</p>
      <h1 class="map-landing__title">VERIDIA</h1>
      <p class="map-landing__sub">Three continents. Fading magic. Buried history.</p>
      <button class="map-landing__btn" id="explore-btn">Explore the World</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="map-sidebar">
    <div class="sidebar__close">
      <button class="sidebar__close-btn" id="map-sidebar-close">&times;</button>
    </div>
    <div id="map-sidebar-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/map.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
